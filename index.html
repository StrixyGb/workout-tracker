<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Тренування">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="./manifest.json">
<title>Workout Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap');
:root{--bg:#0d0d0f;--surface:#18181c;--surface2:#222228;--border:#2e2e38;--accent:#c8f135;--text:#f0f0f0;--muted:#666;--push:#ff6b6b;--pull:#4ecdc4;--legs:#ffd93d;--upper:#a78bfa;--bw:#f97316}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 72px)}
.header{padding:22px 20px 0;margin-bottom:16px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:3px;line-height:1;background:linear-gradient(135deg,var(--accent),#7fff6e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:3px;display:flex;align-items:center;gap:6px}
.save-dot{width:6px;height:6px;border-radius:50%;background:#4ecdc4;transition:background .3s;display:inline-block}
.save-dot.saving{background:#ffd93d}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111114;border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .2s;gap:3px}
.nav-btn .ni{font-size:18px;line-height:1}
.nav-btn.active{color:var(--accent)}
.panel{display:none;padding:0 16px}
.panel.active{display:block}
.day-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{padding:7px 16px;border-radius:999px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .18s}

/* BW CARD */
.bw-card{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(249,115,22,.04));border:1px solid rgba(249,115,22,.3);border-radius:16px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.bw-icon{font-size:26px;line-height:1}
.bw-label{font-size:11px;color:var(--bw);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.bw-input-row{display:flex;align-items:center;gap:8px}
.bw-input{background:var(--surface2);border:1px solid rgba(249,115,22,.4);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;padding:8px 12px;outline:none;width:90px}
.bw-unit{color:var(--muted);font-size:12px}
.bw-save{background:var(--bw);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.bw-current{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--bw);line-height:1}
.bw-current-label{font-size:10px;color:var(--muted);letter-spacing:1px}
.bw-diff{font-size:11px;font-weight:700;margin-top:2px}

.ex-block{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}
.ex-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.ex-name{font-weight:600;font-size:14px}
.ex-meta{color:var(--muted);font-size:11px;margin-top:2px}
.ex-arrow{color:#333;font-size:12px;transition:transform .2s}
.ex-block.open .ex-arrow{transform:rotate(180deg)}
.ex-content{display:none;padding:0 16px 16px}
.ex-block.open .ex-content{display:block}
.input-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.input-row input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 10px;outline:none}
.iw{width:110px}.ik{width:68px}.ir{width:62px}
.btn-add{background:var(--accent);color:#000;border:none;border-radius:10px;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.log-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.log-table th{color:var(--muted);font-weight:500;padding:4px 6px 8px;border-bottom:1px solid #222;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.log-table td{padding:7px 6px;border-bottom:1px solid #1a1a20}
.log-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700}
.bu{background:rgba(200,241,53,.13);color:var(--accent)}.bd{background:rgba(255,107,107,.13);color:var(--push)}.bs{background:rgba(136,136,136,.1);color:var(--muted)}
.btn-del{background:none;border:none;color:#333;cursor:pointer;font-size:13px;padding:2px 6px;border-radius:6px}
.chart-wrap{background:#111116;border-radius:12px;padding:12px 4px 4px;margin-top:4px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:14px;color:var(--accent)}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.ccard-title{font-weight:700;font-size:13px;margin-bottom:2px}
.ccard-sub{font-size:11px;margin-bottom:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px}
.stat-big{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--accent);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.day-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1e1e24;font-size:12px}
.pr-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1e1e24;font-size:12px;align-items:center;gap:8px}
.pr-row:last-child{border-bottom:none}
.pr-val{font-weight:700;color:var(--accent);font-size:14px;white-space:nowrap}
.day-lbl{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:12px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.stats-row{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.stat-chip{font-size:11px;color:#888}
</style>
</head>
<body>
<div class="header">
  <h1>ПРОГРЕС<br>ТРЕКЕР</h1>
  <p>Push · Pull · Legs · Upper <span class="save-dot" id="saveDot"></span></p>
</div>
<div class="panel active" id="panel-overview"></div>
<div class="panel" id="panel-log">
  <div class="day-tabs" id="dayTabs"></div>
  <div id="logDays"></div>
</div>
<div class="panel" id="panel-charts"></div>
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-overview" onclick="switchMain('overview')"><span class="ni">&#127968;</span>Огляд</button>
  <button class="nav-btn" id="nav-log" onclick="switchMain('log')"><span class="ni">&#128221;</span>Записи</button>
  <button class="nav-btn" id="nav-charts" onclick="switchMain('charts')"><span class="ni">&#128200;</span>Графіки</button>
</div>
<script>
const PLAN={
  push:{label:'PUSH',color:'#ff6b6b',emoji:'&#128170;',exercises:[
    {id:'p1',name:'Жим у хамері для грудних',sets:'2x8-10'},
    {id:'p2',name:'Жим сидячи у тренажері',sets:'1-2x10'},
    {id:'p3',name:'Зведення у метелику',sets:'1-2x8-10'},
    {id:'p4',name:'Махи з гантелями',sets:'2x10'},
    {id:'p5',name:'Розгинання трицепс у блоці',sets:'2x10'}
  ]},
  pull:{label:'PULL',color:'#4ecdc4',emoji:'&#128260;',exercises:[
    {id:'pl1',name:'Тяга 1 рукою нижній блок',sets:'1-2x8'},
    {id:'pl2',name:'Тяга верху спини з опорою',sets:'2x6-8'},
    {id:'pl3',name:'Метелик зворотній',sets:'2x8-10'},
    {id:'pl4',name:'Згинання біцепс тренажер',sets:'2x8'}
  ]},
  legs:{label:'LEGS',color:'#ffd93d',emoji:'&#129466;',exercises:[
    {id:'l1',name:'Підйоми на носки',sets:'2x8'},
    {id:'l2',name:'Згинання ніг сидячи',sets:'1x8'},
    {id:'l3',name:'Розгинання ніг сидячи',sets:'1x8'},
    {id:'l4',name:'Жим ногами',sets:'1x8'},
    {id:'l5',name:'Румунська тяга',sets:'1x8'}
  ]},
  upper:{label:'UPPER',color:'#a78bfa',emoji:'&#11014;&#65039;',exercises:[
    {id:'u1',name:'Жим хамер верх грудних',sets:'1-2x8-10'},
    {id:'u2',name:'Тяга верхнього блоку',sets:'1-2x10'},
    {id:'u3',name:'Тяга з опорою',sets:'1x10'},
    {id:'u4',name:'JM Press',sets:'1-2x8'},
    {id:'u5',name:'Молотки з гантелями',sets:'1-2x8'}
  ]}
};

let log={},bwLog={},CH={},saveTimer=null,activeDay='push';

function loadLog(){
  try{log=JSON.parse(localStorage.getItem('wt_v2')||'{}')}catch{log={}}
  try{bwLog=JSON.parse(localStorage.getItem('wt_bw')||'{}')}catch{bwLog={}}
}
function saveAll(){
  const d=document.getElementById('saveDot');d.classList.add('saving');
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    localStorage.setItem('wt_v2',JSON.stringify(log));
    localStorage.setItem('wt_bw',JSON.stringify(bwLog));
    d.classList.remove('saving');
  },600);
}
function getE(id){return log[id]||[]}
function nw(id){const a=getE(id);if(!a.length)return'Тиждень 1';const n=parseInt(a[a.length-1].week.replace(/\D/g,''))||a.length;return'Тиждень '+(n+1)}
function getPR(id){const a=getE(id);return a.length?Math.max(...a.map(e=>e.weight))+' кг':''}
function getColor(id){let c='#c8f135';Object.values(PLAN).forEach(d=>{if(d.exercises.find(e=>e.id===id))c=d.color});return c}

// BW per day key: push/pull/legs/upper -> array of {week, weight}
function getBW(day){return bwLog[day]||[]}
function getLastBW(day){const a=getBW(day);return a.length?a[a.length-1].weight:null}
function nwBW(day){const a=getBW(day);if(!a.length)return'Тиждень 1';const n=parseInt(a[a.length-1].week.replace(/\D/g,''))||a.length;return'Тиждень '+(n+1)}

function saveBW(day){
  const wEl=document.getElementById('bw-week-'+day);
  const kEl=document.getElementById('bw-kg-'+day);
  const weight=parseFloat(kEl.value);
  if(isNaN(weight))return;
  const week=wEl.value.trim()||nwBW(day);
  if(!bwLog[day])bwLog[day]=[];
  bwLog[day].push({week,weight});
  saveAll();
  kEl.value='';wEl.value='';wEl.placeholder=nwBW(day);
  renderBWCard(day);
}

function renderBWCard(day){
  const cont=document.getElementById('bw-card-'+day);
  if(!cont)return;
  const arr=getBW(day);
  const last=arr.length?arr[arr.length-1].weight:null;
  const prev=arr.length>1?arr[arr.length-2].weight:null;
  const diff=last!==null&&prev!==null?+(last-prev).toFixed(1):null;
  const diffStr=diff===null?''
    :diff>0?`<span style="color:#f87171">+${diff} кг</span>`
    :diff<0?`<span style="color:var(--accent)">${diff} кг</span>`
    :`<span style="color:var(--muted)">без змін</span>`;

  cont.innerHTML=`
    <div class="bw-icon">&#9878;&#65039;</div>
    <div style="flex:1">
      <div class="bw-label">Вага тіла (BW)</div>
      <div class="bw-input-row">
        <input class="bw-input" id="bw-kg-${day}" type="number" placeholder="${last||'кг'}" min="30" step="0.1">
        <input style="background:var(--surface2);border:1px solid rgba(249,115,22,.3);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;outline:none;width:100px" id="bw-week-${day}" placeholder="${nwBW(day)}">
        <button class="bw-save" onclick="saveBW('${day}')">Зберегти</button>
      </div>
    </div>
    ${last!==null?`<div style="text-align:right;min-width:60px">
      <div class="bw-current">${last}</div>
      <div class="bw-current-label">кг зараз</div>
      ${diff!==null?`<div class="bw-diff">${diffStr}</div>`:''}
    </div>`:''}`;
}

function switchMain(tab){
  ['overview','log','charts'].forEach(t=>{
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='charts')renderCharts();
  if(tab==='overview')renderOverview();
}

function buildDayTabs(){
  const el=document.getElementById('dayTabs');el.innerHTML='';
  Object.entries(PLAN).forEach(([key,d])=>{
    const b=document.createElement('button');b.className='day-tab';
    if(key===activeDay){b.style.cssText=`border-color:${d.color};background:${d.color};color:#000`}
    b.textContent=d.label;b.onclick=()=>switchDay(key);el.appendChild(b);
  });
}
function switchDay(key){activeDay=key;buildDayTabs();buildDayContent(key)}

function buildDayContent(key){
  const day=PLAN[key],cont=document.getElementById('logDays');
  cont.innerHTML=`<div class="day-lbl" style="color:${day.color}">${day.emoji} ${day.label}</div>`;

  // BW card
  const bwCard=document.createElement('div');
  bwCard.className='bw-card';bwCard.id='bw-card-'+key;
  cont.appendChild(bwCard);
  renderBWCard(key);

  // Exercises
  day.exercises.forEach(ex=>{
    const b=document.createElement('div');b.className='ex-block';b.id='block-'+ex.id;
    b.innerHTML=`<div class="ex-header" onclick="toggleEx('${ex.id}')"><div><div class="ex-name">${ex.name}</div><div class="ex-meta">${ex.sets} &nbsp;&#183;&nbsp; <span id="cnt-${ex.id}">${getE(ex.id).length}</span> зап.</div></div><div style="display:flex;align-items:center;gap:10px"><span style="color:${day.color};font-weight:700;font-size:13px" id="pr-${ex.id}">${getPR(ex.id)}</span><span class="ex-arrow">&#9660;</span></div></div><div class="ex-content" id="ct-${ex.id}"><div class="input-row"><input class="iw" id="iw-${ex.id}" placeholder="${nw(ex.id)}"><input class="ik" id="ik-${ex.id}" type="number" placeholder="кг" min="0" step="0.5"><input class="ir" id="ir-${ex.id}" placeholder="повт."><button class="btn-add" onclick="addE('${ex.id}')">+ Додати</button></div><div id="tbl-${ex.id}"></div><div id="cw-${ex.id}" style="display:none" class="chart-wrap"><canvas id="ch-${ex.id}" height="100"></canvas></div></div>`;
    cont.appendChild(b);renderTable(ex.id);
  });
}

function toggleEx(id){document.getElementById('block-'+id).classList.toggle('open')}

function addE(id){
  const week=document.getElementById('iw-'+id).value.trim()||nw(id);
  const weight=parseFloat(document.getElementById('ik-'+id).value);
  const reps=document.getElementById('ir-'+id).value.trim();
  if(isNaN(weight)||!reps)return;
  if(!log[id])log[id]=[];log[id].push({week,weight,reps});saveAll();
  document.getElementById('ik-'+id).value='';document.getElementById('ir-'+id).value='';
  document.getElementById('iw-'+id).value='';document.getElementById('iw-'+id).placeholder=nw(id);
  const p=document.getElementById('pr-'+id);if(p)p.textContent=getPR(id);
  const c=document.getElementById('cnt-'+id);if(c)c.textContent=getE(id).length;
  renderTable(id);
}
function delE(id,idx){log[id].splice(idx,1);saveAll();const p=document.getElementById('pr-'+id);if(p)p.textContent=getPR(id);const c=document.getElementById('cnt-'+id);if(c)c.textContent=getE(id).length;renderTable(id)}

function renderTable(id){
  const arr=getE(id),color=getColor(id);
  const tbl=document.getElementById('tbl-'+id),cw=document.getElementById('cw-'+id);
  if(!tbl)return;
  if(!arr.length){tbl.innerHTML='<p style="color:#444;font-size:12px;padding:4px 0 8px">Додай перший запис &#128070;</p>';if(cw)cw.style.display='none';return}
  let h='<table class="log-table"><thead><tr><th>Тиждень</th><th>Вага</th><th>Повт.</th><th>&#916;</th><th></th></tr></thead><tbody>';
  arr.forEach((e,i)=>{
    const prev=i>0?arr[i-1].weight:null,diff=prev!==null?+(e.weight-prev).toFixed(1):null;
    let badge='';if(diff!==null){if(diff>0)badge=`<span class="badge bu">&#8593; +${diff}</span>`;else if(diff<0)badge=`<span class="badge bd">&#8595; ${diff}</span>`;else badge='<span class="badge bs">&#8594;</span>'}
    h+=`<tr><td>${e.week}</td><td><strong>${e.weight} кг</strong></td><td style="color:#888">${e.reps}</td><td>${badge}</td><td><button class="btn-del" onclick="delE('${id}',${i})">&#10005;</button></td></tr>`;
  });
  tbl.innerHTML=h+'</tbody></table>';
  if(arr.length>=2&&cw){
    cw.style.display='block';if(CH['t_'+id])CH['t_'+id].destroy();
    CH['t_'+id]=new Chart(document.getElementById('ch-'+id).getContext('2d'),{type:'line',data:{labels:arr.map(e=>e.week.replace('Тиждень ','Тж')),datasets:[{data:arr.map(e=>e.weight),borderColor:color,backgroundColor:color+'22',pointBackgroundColor:color,pointRadius:4,borderWidth:2,fill:true,tension:.35}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'#222228',bodyColor:color,borderColor:'#2e2e38',borderWidth:1,callbacks:{label:c=>' '+c.parsed.y+' кг'}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1e1e24'}},y:{ticks:{color:'#555',font:{size:10},callback:v=>v+' кг'},grid:{color:'#1e1e24'}}}}});
  }
}

// ---- CHARTS ----
function renderCharts(){
  const cont=document.getElementById('panel-charts');cont.innerHTML='';
  const allEx=Object.values(PLAN).flatMap(d=>d.exercises);
  const allBW=Object.values(bwLog).flat();
  const hasAny=allEx.some(ex=>getE(ex.id).length>0)||allBW.length>0;
  if(!hasAny){cont.innerHTML='<div class="card" style="text-align:center;color:#444;padding:40px"><div style="font-size:44px;margin-bottom:12px">&#128202;</div><div style="font-size:14px;color:#666;margin-bottom:6px">Ще немає даних</div><div style="font-size:12px">Перейди у <strong style="color:var(--accent)">Записи</strong> і додай тренування!</div></div>';return}

  // All weeks
  const wset=new Set();
  allEx.forEach(ex=>getE(ex.id).forEach(e=>wset.add(e.week)));
  Object.values(bwLog).forEach(arr=>arr.forEach(e=>wset.add(e.week)));
  const weeks=[...wset].sort((a,b)=>(parseInt(a.replace(/\D/g,''))||0)-(parseInt(b.replace(/\D/g,''))||0));
  const wlabels=weeks.map(w=>w.replace('Тиждень ','Тж'));

  // === BW SECTION ===
  // Merge all BW entries across days, sorted by week
  const bwAll=[];
  Object.entries(bwLog).forEach(([day,arr])=>{arr.forEach(e=>bwAll.push({week:e.week,weight:e.weight,day}))});
  bwAll.sort((a,b)=>(parseInt(a.week.replace(/\D/g,''))||0)-(parseInt(b.week.replace(/\D/g,''))||0));

  if(bwAll.length>=1){
    const sec0=document.createElement('div');sec0.className='sec-title';sec0.innerHTML='&#9878;&#65039; Вага тіла (BW)';cont.appendChild(sec0);
    const bwCard=document.createElement('div');bwCard.className='ccard';

    const bwWeights=bwAll.map(e=>e.weight);
    const maxBW=Math.max(...bwWeights),minBW=Math.min(...bwWeights);
    const gain=+(bwWeights[bwWeights.length-1]-bwWeights[0]).toFixed(1);
    const gainColor=gain<=0?'var(--accent)':'#f87171';
    const gainStr=gain>0?'+'+gain+' кг &#128201;':gain<0?gain+' кг &#128200;':'без змін';

    bwCard.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div class="ccard-title">Вага тіла — загальна прогресія</div>
          <div class="ccard-sub" style="color:var(--bw)">всі тренування</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--bw);line-height:1">${bwWeights[bwWeights.length-1]} кг</div>
          <div style="font-size:10px;color:#555">зараз</div>
        </div>
      </div>
      <div class="stats-row">
        <span class="stat-chip">Зміна: <strong style="color:${gainColor}">${gainStr}</strong></span>
        <span class="stat-chip">Макс: <strong>${maxBW} кг</strong></span>
        <span class="stat-chip">Мін: <strong>${minBW} кг</strong></span>
        <span class="stat-chip">Записів: <strong>${bwAll.length}</strong></span>
      </div>`;

    const w=document.createElement('div');w.className='chart-wrap';
    const cv=document.createElement('canvas');cv.height=130;w.appendChild(cv);bwCard.appendChild(w);
    cont.appendChild(bwCard);

    if(CH['bw_main'])CH['bw_main'].destroy();
    CH['bw_main']=new Chart(cv.getContext('2d'),{type:'line',data:{
      labels:bwAll.map(e=>e.week.replace('Тиждень ','Тж')+' ('+e.day.toUpperCase()[0]+')'),
      datasets:[{
        data:bwWeights,
        borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.15)',
        pointBackgroundColor:bwAll.map(e=>PLAN[e.day].color),
        pointRadius:6,borderWidth:2.5,fill:true,tension:.35
      }]
    },options:{responsive:true,plugins:{
      legend:{display:false},
      tooltip:{backgroundColor:'#222228',bodyColor:'#f97316',borderColor:'#2e2e38',borderWidth:1,callbacks:{
        label:c=>' '+c.parsed.y+' кг',
        title:items=>{const e=bwAll[items[0].dataIndex];return e.week+' · '+PLAN[e.day].label}
      }}
    },scales:{
      x:{ticks:{color:'#555',font:{size:9}},grid:{color:'#1e1e24'}},
      y:{ticks:{color:'#555',font:{size:10},callback:v=>v+' кг'},grid:{color:'#1e1e24'}}
    }}});

    // BW per day breakdown
    const bwDayCard=document.createElement('div');bwDayCard.className='ccard';
    bwDayCard.innerHTML='<div class="ccard-title" style="margin-bottom:12px">BW по днях тренувань</div>';
    Object.entries(PLAN).forEach(([key,day])=>{
      const arr=getBW(key);if(!arr.length)return;
      const last=arr[arr.length-1].weight;
      const diff=arr.length>1?+(last-arr[arr.length-2].weight).toFixed(1):null;
      const diffStr=diff===null?'':diff>0?`<span style="color:#f87171">+${diff}</span>`:diff<0?`<span style="color:var(--accent)">${diff}</span>`:'';
      bwDayCard.innerHTML+=`<div class="pr-row"><span style="color:${day.color};font-weight:600">${day.label}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:#555">${diffStr}</span><span class="pr-val" style="color:var(--bw)">${last} кг</span></div></div>`;
    });
    cont.appendChild(bwDayCard);
  }

  // === PER DAY TYPE ===
  cont.appendChild(Object.assign(document.createElement('div'),{className:'sec-title',textContent:'По типу тренування'}));
  Object.entries(PLAN).forEach(([key,day])=>{
    const datasets=day.exercises.map((ex,ei)=>{
      const arr=getE(ex.id);if(!arr.length)return null;
      const map={};arr.forEach(e=>map[e.week]=e.weight);
      const alpha=Math.round(255*(1-ei*0.12)).toString(16).padStart(2,'0');
      return{label:ex.name.split(' ').slice(0,3).join(' '),data:weeks.map(w=>map[w]??null),borderColor:day.color+alpha,backgroundColor:'transparent',pointBackgroundColor:day.color+alpha,pointRadius:3,borderWidth:2,tension:.35,spanGaps:true};
    }).filter(Boolean);
    const card=document.createElement('div');card.className='ccard';
    card.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span class="dot" style="background:${day.color}"></span><span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px">${day.label}</span></div>`;
    if(!datasets.length){card.innerHTML+='<div style="color:#333;font-size:12px;text-align:center;padding:16px 0">Немає даних</div>';}
    else{
      const w=document.createElement('div');w.className='chart-wrap';
      const cv=document.createElement('canvas');cv.height=130;w.appendChild(cv);card.appendChild(w);
      const cid='day_'+key;if(CH[cid])CH[cid].destroy();
      CH[cid]=new Chart(cv.getContext('2d'),{type:'line',data:{labels:wlabels,datasets},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,labels:{color:'#555',font:{size:9},boxWidth:8,padding:6}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1e1e24'}},y:{ticks:{color:'#555',font:{size:10},callback:v=>v+' кг'},grid:{color:'#1e1e24'}}}}});
    }
    cont.appendChild(card);
  });

  // === PER EXERCISE ===
  const sec2=document.createElement('div');sec2.className='sec-title';sec2.style.marginTop='8px';sec2.textContent='По вправах';cont.appendChild(sec2);
  Object.entries(PLAN).forEach(([key,day])=>{
    day.exercises.forEach(ex=>{
      const arr=getE(ex.id);if(!arr.length)return;
      const weights=arr.map(e=>e.weight);
      const maxW=Math.max(...weights),minW=Math.min(...weights);
      const gain=+(weights[weights.length-1]-weights[0]).toFixed(1);
      const gainColor=gain>=0?'var(--accent)':'var(--push)';
      const gainStr=gain>0?'+'+gain+' кг &#128200;':gain<0?gain+' кг &#128201;':'без змін';
      const card=document.createElement('div');card.className='ccard';
      card.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div><div class="ccard-title">${ex.name}</div><div class="ccard-sub" style="color:${day.color}">${day.label}</div></div><div style="text-align:right"><div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:${day.color};line-height:1">${maxW} кг</div><div style="font-size:10px;color:#555">рекорд</div></div></div><div class="stats-row"><span class="stat-chip">Прогрес: <strong style="color:${gainColor}">${gainStr}</strong></span><span class="stat-chip">Мін: <strong>${minW} кг</strong></span><span class="stat-chip">Записів: <strong>${arr.length}</strong></span></div>`;
      const w=document.createElement('div');w.className='chart-wrap';const cv=document.createElement('canvas');cv.height=110;w.appendChild(cv);card.appendChild(w);
      const cid='ex_'+ex.id;if(CH[cid])CH[cid].destroy();
      CH[cid]=new Chart(cv.getContext('2d'),{type:'line',data:{labels:arr.map(e=>e.week.replace('Тиждень ','Тж')),datasets:[{data:weights,borderColor:day.color,backgroundColor:day.color+'22',pointBackgroundColor:day.color,pointRadius:5,borderWidth:2.5,fill:true,tension:.35}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'#222228',bodyColor:day.color,borderColor:'#2e2e38',borderWidth:1,callbacks:{label:c=>' '+c.parsed.y+' кг'}}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'#1e1e24'}},y:{ticks:{color:'#555',font:{size:10},callback:v=>v+' кг'},grid:{color:'#1e1e24'}}}}});
      cont.appendChild(card);
    });
  });
}

// ---- OVERVIEW ----
function renderOverview(){
  const cont=document.getElementById('panel-overview');
  const allEx=Object.values(PLAN).flatMap(d=>d.exercises);
  const total=allEx.reduce((s,ex)=>s+getE(ex.id).length,0);
  const prs=allEx.map(ex=>{const a=getE(ex.id);if(!a.length)return null;return{name:ex.name,max:Math.max(...a.map(e=>e.weight))}}).filter(Boolean).sort((a,b)=>b.max-a.max);
  const ds=Object.entries(PLAN).map(([k,d])=>`<div class="day-stat"><span style="color:${d.color};font-weight:600">${d.label}</span><span style="color:#555">${d.exercises.filter(e=>getE(e.id).length>0).length}/${d.exercises.length} вправ</span></div>`).join('');
  const prRows=prs.length?prs.slice(0,10).map(p=>`<div class="pr-row"><span style="color:#aaa">${p.name}</span><span class="pr-val">${p.max} кг</span></div>`).join(''):'<div style="color:#444;font-size:12px">Ще немає записів</div>';

  // BW summary
  const allBW=Object.values(bwLog).flat().sort((a,b)=>(parseInt(a.week.replace(/\D/g,''))||0)-(parseInt(b.week.replace(/\D/g,''))||0));
  const currentBW=allBW.length?allBW[allBW.length-1].weight:null;
  const bwSection=currentBW?`<div class="card" style="border-color:rgba(249,115,22,.3)"><div class="card-title" style="color:var(--bw)">&#9878;&#65039; Вага тіла</div><div style="display:flex;align-items:baseline;gap:8px"><div style="font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--bw);line-height:1">${currentBW}</div><div style="font-size:18px;color:var(--muted)">кг</div></div><div style="font-size:11px;color:#555;margin-top:4px">останній запис · ${allBW.length} вимірів</div></div>`:'';

  cont.innerHTML=`${bwSection}<div class="card"><div class="card-title">&#128202; Статистика</div><div style="display:flex;gap:28px"><div><div class="stat-big">${total}</div><div class="stat-label">Записів</div></div><div><div class="stat-big">${prs.length}</div><div class="stat-label">Вправ</div></div></div><div style="margin-top:16px">${ds}</div></div><div class="card"><div class="card-title">&#127942; Особисті рекорди</div>${prRows}</div>${!total&&!currentBW?'<div class="card" style="text-align:center;color:#444;padding:32px"><div style="font-size:40px;margin-bottom:12px">&#127947;</div><div>Перейди у <strong style="color:var(--accent)">Записи</strong> і додай перші тренування!</div></div>':''}`;
}

loadLog();buildDayTabs();buildDayContent('push');renderOverview();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
